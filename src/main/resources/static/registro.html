<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Alta en el Sistema - CE Explorer</title>
	<link href="css/style.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
	<link
		href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syncopate:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap"
		rel="stylesheet">
	<style>
		body {
			background-color: #121212;
		}

		.login-card {
			background: rgba(25, 25, 25, 0.95);
			border: 1px solid #333;
		}

		.form-control-dark {
			background-color: #222;
			border: 1px solid #444;
			color: #fff;
		}

		.form-control-dark:focus {
			background-color: #2a2a2a;
			border-color: #b71c1c;
			color: #fff;
			box-shadow: 0 0 0 0.25rem rgba(183, 28, 28, 0.25);
		}
	</style>
</head>

<body class="d-flex flex-column min-vh-100 align-items-center justify-content-center py-5"
	style="background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('img/hero_historia.jpg') center/cover; background-attachment: fixed;">

	<div class="container">
		<div class="row justify-content-center">
			<div class="col-md-8 col-lg-7">

				<div class="text-center mb-4">
					<a href="index.html" class="text-decoration-none">
						<i class="fa-solid fa-file-signature fa-3x text-danger mb-3"></i>
						<h2 class="mono text-white text-uppercase fw-bold m-0" style="letter-spacing: 2px;">CE Explorer
						</h2>
					</a>
					<p class="text-white-50 small mt-2 mono">Formulario de Identificación y Alta</p>
				</div>

				<div class="card login-card shadow-lg p-4 p-md-5 rounded-4">

					<div id="mensajeAlerta" class="alert d-none small mono fw-bold text-center" role="alert"></div>

					<form id="formularioRegistro">

						<h5 class="text-white mono border-bottom border-secondary pb-2 mb-4">Datos de Acceso</h5>
						<div class="row g-3 mb-4">
							<div class="col-md-6">
								<label class="form-label text-white-50 small text-uppercase mono">Usuario</label>
								<input type="text" class="form-control form-control-dark" id="cuenta" required>
							</div>
							<div class="col-md-6">
								<label class="form-label text-white-50 small text-uppercase mono">Contraseña</label>
								<input type="password" class="form-control form-control-dark" id="clave" required>
							</div>
						</div>

						<h5 class="text-white mono border-bottom border-secondary pb-2 mb-4">Identidad Legal (SBU)</h5>
						<div class="row g-3 mb-4">
							<div class="col-md-6">
								<label class="form-label text-white-50 small text-uppercase mono">Nombre</label>
								<input type="text" class="form-control form-control-dark" id="nombre" required>
							</div>
							<div class="col-md-6">
								<label class="form-label text-white-50 small text-uppercase mono">Primer
									Apellido</label>
								<input type="text" class="form-control form-control-dark" id="apellido1" required>
							</div>
							<div class="col-md-6">
								<label class="form-label text-white-50 small text-uppercase mono">Segundo
									Apellido</label>
								<input type="text" class="form-control form-control-dark" id="apellido2">
							</div>
							<div class="col-md-6">
								<label class="form-label text-white-50 small text-uppercase mono">DNI /
									Pasaporte</label>
								<input type="text" class="form-control form-control-dark" id="dni"
									placeholder="Ej: 12345678A" required>
							</div>
							<div class="col-md-6">
								<label class="form-label text-white-50 small text-uppercase mono">Nacionalidad</label>
								<input type="text" class="form-control form-control-dark" id="nacionalidad" required>
							</div>
							<div class="col-md-6">
								<label class="form-label text-white-50 small text-uppercase mono">Nacimiento
									(+18)</label>
								<input type="date" class="form-control form-control-dark" id="fechaNacimiento" required>
							</div>
						</div>

						<h5 class="text-white mono border-bottom border-secondary pb-2 mb-4">Contacto</h5>
						<div class="row g-3 mb-4">
							<div class="col-md-6">
								<label class="form-label text-white-50 small text-uppercase mono">Email</label>
								<input type="email" class="form-control form-control-dark" id="email" required>
							</div>
							<div class="col-md-6">
								<label class="form-label text-white-50 small text-uppercase mono">Teléfono</label>
								<input type="tel" class="form-control form-control-dark" id="telefono" required>
							</div>
						</div>

						<div class="form-check mb-4 mt-2">
							<input class="form-check-input" type="checkbox" id="aceptoTerminos" required>
							<label class="form-check-label text-white-50 small" for="aceptoTerminos">
								He leído los <a href="legalidades/terminos.html" target="_blank"
									class="text-danger fw-bold text-decoration-underline">Términos de Expedición <i
										class="fa-solid fa-arrow-up-right-from-square small ms-1"></i></a> y confirmo
								bajo responsabilidad legal que soy mayor de edad.
							</label>
						</div>

						<button type="submit" id="btnRegistrar"
							class="btn btn-danger w-100 py-2 mono fw-bold text-uppercase mb-3">Procesar Alta</button>

						<div class="text-center mt-3">
							<a href="login.html" class="text-white-50 text-decoration-none small hover-white"><i
									class="fa-solid fa-arrow-left me-2"></i>Volver al acceso</a>
						</div>
					</form>
				</div>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script src="js/script.js"></script>
</body>

</html>
