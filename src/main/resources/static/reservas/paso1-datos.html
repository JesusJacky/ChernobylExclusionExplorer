<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Paso 1: Datos - CE Explorer</title>
	<link href="../css/style.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex flex-column min-vh-100">
	<div id="navbar-container"></div>

	<div class="container py-5">
		<div class="row justify-content-center">
			<div class="col-lg-8">
				<h3 class="mono fw-bold text-uppercase mb-4"><i class="fa-solid fa-1 text-danger me-2"></i>Datos de
					Expedición</h3>

				<form id="formPaso1" class="card shadow-sm border-0 p-4 rounded-4">
					<h5 class="text-danger fw-bold border-bottom pb-2 mb-4" id="nombrePaqueteUI">Cargando Paquete...
					</h5>

					<div class="row g-3 mb-4">
						<div class="col-md-6">
							<label class="form-label small fw-bold">Fecha de Entrada</label>
							<input type="date" id="fechaViaje" class="form-control" required>
						</div>
						<div class="col-md-6">
							<label class="form-label small fw-bold">Teléfono de Emergencia</label>
							<input type="tel" id="telefonoContacto" class="form-control" required>
						</div>
					</div>

					<h6 class="fw-bold mt-4 mb-3 text-muted">Titular de Misión (Autocompletado)</h6>
					<div class="row g-2 mb-4 bg-light p-3 border rounded">
						<div class="col-md-6"><input type="text" id="titularNombre" class="form-control form-control-sm"
								readonly></div>
						<div class="col-md-6"><input type="text" id="titularDni" class="form-control form-control-sm"
								readonly></div>
						<input type="hidden" id="titularEmail">
					</div>

					<div class="d-flex justify-content-between align-items-center mb-3 mt-4 border-bottom pb-2">
						<h6 class="fw-bold text-muted m-0">Pasajeros Adicionales (Grupo)</h6>
						<button type="button" id="btnAddAcomp" class="btn btn-outline-secondary btn-sm mono"><i
								class="fa-solid fa-plus me-1"></i> Añadir</button>
					</div>
					<div id="listaAcompanantes"></div>

					<div class="form-check mt-5 mb-4">
						<input class="form-check-input border-secondary" type="checkbox" id="checkLegal" required>
						<label class="form-check-label small text-muted">
							Certifico ser mayor de edad y acepto la <a
								href="../legalidades/declaracion-responsabilidad.html" target="_blank"
								class="fw-bold text-danger">Declaración de Responsabilidad</a>.
						</label>
					</div>

					<button type="submit" class="btn btn-dark w-100 py-3 mono fw-bold">Continuar al Resumen <i
							class="fa-solid fa-arrow-right ms-2"></i></button>
				</form>
			</div>
		</div>
	</div>

	<div id="footer-container" class="mt-auto"></div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script src="../js/script.js"></script>
</body>

</html>
