<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Paso 3: Pago - CE Explorer</title>
	<link href="../css/style.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex flex-column min-vh-100">
	<div id="navbar-container"></div>

	<div class="container py-5">
		<div class="row justify-content-center">
			<div class="col-lg-5">
				<h3 class="mono fw-bold text-uppercase mb-4 text-center"><i
						class="fa-solid fa-3 text-success me-2"></i>Pasarela Segura</h3>

				<form id="formPaso3" class="card shadow border-0 p-4 rounded-4">
					<div class="mb-4 text-white p-3 rounded-3"
						style="background: linear-gradient(135deg, #1e1e1e 0%, #3a3a3a 100%); border: 1px solid #555;">
						<div class="d-flex justify-content-between mb-4">
							<i class="fa-regular fa-credit-card fa-2x"></i><i class="fa-brands fa-cc-visa fa-2x"></i>
						</div>
						<p class="fs-5 mb-2 mono tracking-widest text-warning" id="cardShow">**** **** **** ****</p>
						<div class="d-flex justify-content-between small mono">
							<span id="nameShow" class="text-uppercase">TITULAR</span><span>CVV: ***</span>
						</div>
					</div>

					<div class="mb-3">
						<input type="text" class="form-control text-center mono" id="tarjetaNum"
							placeholder="Número (16 dígitos)" maxlength="16" pattern="^[0-9]{16}$" required>
					</div>
					<div class="mb-3">
						<input type="text" class="form-control text-uppercase" id="tarjetaTitular"
							placeholder="Titular de la tarjeta" required>
					</div>
					<div class="row mb-4">
						<div class="col-6"><input type="text" class="form-control text-center" placeholder="MM/YY"
								required></div>
						<div class="col-6"><input type="password" class="form-control text-center mono"
								placeholder="CVV" maxlength="3" pattern="^[0-9]{3}$" required></div>
					</div>

					<div id="alertaPago" class="alert d-none text-center mono small fw-bold"></div>

					<button type="submit" id="btnPagarFinal" class="btn btn-success w-100 py-3 fs-5 fw-bold shadow"><i
							class="fa-solid fa-lock me-2"></i> Pagar y Enviar</button>
				</form>
			</div>
		</div>
	</div>

	<div id="footer-container" class="mt-auto"></div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script src="../js/script.js"></script>
</body>

</html>
