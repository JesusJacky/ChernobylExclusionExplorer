<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paso 2: Resumen - CE Explorer</title>
    <link href="../css/style.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    <div id="navbar-container"></div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <h3 class="mono fw-bold text-uppercase mb-4 text-center"><i class="fa-solid fa-2 text-danger me-2"></i>Confirmación</h3>
                
                <div class="card shadow border-0 p-4 mb-4 rounded-4" style="border-left: 5px solid #dc3545;">
                    <div class="d-flex justify-content-between border-bottom pb-3 mb-3">
                        <span class="text-muted fw-bold">Expedición:</span><span class="fw-bold text-dark text-end" id="resumenPaquete"></span>
                    </div>
                    <div class="d-flex justify-content-between border-bottom pb-3 mb-3">
                        <span class="text-muted fw-bold">Fecha:</span><span class="fw-bold text-dark" id="resumenFecha"></span>
                    </div>
                    <div class="d-flex justify-content-between border-bottom pb-3 mb-3">
                        <span class="text-muted fw-bold">Pasajeros Totales:</span><span class="fw-bold text-dark" id="resumenPax"></span>
                    </div>
                    
                    <div class="bg-light p-3 rounded mb-3 border">
                        <p class="small text-muted fw-bold mb-2 border-bottom pb-1">Viajeros Registrados (Lista para el SBU):</p>
                        <ul id="resumenNombres" class="small mb-0 ps-3 mono text-dark"></ul>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mt-4 bg-dark text-white p-3 rounded">
                        <span class="fs-5 mono text-muted">A ABONAR:</span><span class="fs-3 fw-bold text-warning" id="resumenPrecio"></span>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="button" id="btnVolverPaso1" class="btn btn-outline-secondary w-50 py-2 mono fw-bold">Rectificar Datos</button>
                    <button type="button" id="btnConfirmarResumen" class="btn btn-danger w-50 py-2 mono fw-bold shadow">Confirmar y Pagar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-container" class="mt-auto"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
