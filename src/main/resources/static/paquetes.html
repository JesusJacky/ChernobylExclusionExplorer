<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Expediciones - CE Explorer</title>
	<link href="css/style.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
	<link
		href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syncopate:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap"
		rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100 bg-light">

	<div id="navbar-container"></div>

	<header class="py-5 bg-dark text-white text-center"
		style="background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('img/hero_historia.jpg') center/cover;">
		<div class="container py-4">
			<h1 class="display-5 mono fw-bold mb-3 text-uppercase"><i
					class="fa-solid fa-map-location-dot text-muted me-3"></i>Catálogo de Expediciones</h1>
			<p class="lead text-white-50 mx-auto" style="max-width: 800px;">Seleccione su itinerario. Las tarifas
				cerradas para grupos incluyen protección radiológica, escolta militar y permisos gubernamentales.</p>
		</div>
	</header>

	<section class="py-5">
		<div class="container">
			<div class="row g-4" id="contenedorPaquetes">
				<!-- Las 9 expediciones cargan desde js/script.js -->
				<div class="text-center w-100 py-5">
					<div class="spinner-border text-danger" role="status"></div>
					<p class="mt-2 mono text-muted">Desclasificando archivos de itinerarios...</p>
				</div>
			</div>
		</div>
	</section>

	<div id="footer-container" class="mt-auto"></div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script src="js/script.js"></script>
</body>

</html>
