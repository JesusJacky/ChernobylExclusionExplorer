<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>SBU - Terminal Operativo</title>
	<link href="/css/style.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
	<link
		href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
		rel="stylesheet">
</head>

<body class="sbu-intranet d-flex flex-column min-vh-100">

	<!-- ==========================================================================
	     BARRA DE NAVEGACIÓN
	     ========================================================================== -->
	<div id="navbar-container"></div>

	<!-- ==========================================================================
	     CONTENEDOR PRINCIPAL
	     ========================================================================== -->
	<div class="container-fluid px-4 py-4 flex-grow-1">

		<div class="row mb-4">
			<div class="col-12">
				<h4 class="mono fw-bold text-corporate border-bottom border-corporate pb-2">
					<i class="fa-solid fa-desktop me-2"></i>TERMINAL DE OPERACIONES
				</h4>
			</div>
		</div>

		<div class="row g-4">

			<!-- ==========================================================================
			     COLUMNA IZQUIERDA: PERFIL DEL TRABAJADOR
			     ========================================================================== -->
			<div class="col-lg-3">
				<div class="card shadow-sm rounded-3">
					<div class="card-header mono small fw-bold"><i
							class="fa-solid fa-id-card-clip me-2"></i>Credenciales Operativas</div>
					<div class="card-body text-center py-4">
						<i class="fa-solid fa-headset fa-4x mb-3 text-muted-sbu"></i>

						<h5 class="fw-bold mb-0 text-uppercase text-white" id="empNombre">Cargando...</h5>
						<p class="small mb-3 text-muted-sbu" id="empApellidos"></p>

						<div class="d-flex justify-content-center gap-2 mono small">
							<span class="badge badge-sbu-dark" id="empCuenta">...</span>
							<span class="badge badge-sbu-accent shadow-sm" id="empRol">...</span>
						</div>

						<div class="d-flex justify-content-center mt-3">
							<span
								class="badge border border-corporate text-white-50 mono py-1 px-2 fw-normal rounded-pill"
								id="empCodigoInterno">
								<i class="fa-solid fa-barcode me-1"></i> LEYENDO...
							</span>
						</div>
					</div>
				</div>

				<!-- ==========================================================================
				     MÓDULO DE RECURSOS HUMANOS (Oculto. JS lo destapa si es SUPERVISOR)
				     ========================================================================== -->
				<div id="moduloAdminRH"
					class="card shadow-sm rounded-3 bg-accent-soft border border-corporate d-none mt-4">
					<div class="card-header mono small fw-bold text-corporate border-corporate">
						<i class="fa-solid fa-users-gear me-2"></i>Gestión de Personal
					</div>
					<div class="card-body">
						<p class="small mb-3 text-white-50">Alta de nuevos operarios de datos vinculados a este sector.
						</p>
						<button id="btnAbrirModalAltaEmpleado"
							class="btn btn-sbu-accent w-100 mono fw-bold text-uppercase rounded-2">
							<i class="fa-solid fa-user-plus me-2"></i>Dar de Alta
						</button>
					</div>
				</div>
			</div>

			<!-- ==========================================================================
			     COLUMNA DERECHA: ÁREA DE TRABAJO
			     ========================================================================== -->
			<div class="col-lg-9">
				<div class="card shadow-sm rounded-3 h-100">
					<div class="card-header mono small fw-bold d-flex justify-content-between align-items-center">
						<span><i class="fa-solid fa-list-check me-2"></i>Mis Tareas Asignadas</span>
					</div>
					<div class="card-body d-flex align-items-center justify-content-center">
						<div class="text-center mono text-muted-sbu opacity-50">
							<i class="fa-solid fa-satellite-dish fa-3x mb-3"></i>
							<h6>RECIBIENDO TRANSMISIONES...</h6>
						</div>
					</div>
				</div>
			</div>

		</div>
	</div>

	<!-- ==========================================================================
	     PIE DE PÁGINA
	     ========================================================================== -->
	<div id="footer-container" class="mt-auto"></div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script src="/js/script.js"></script>
</body>

</html>
