<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>SBU - Expediente de Reserva</title>
	<link href="/css/style.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
	<link
		href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
		rel="stylesheet">
</head>

<body class="sbu-intranet d-flex flex-column min-vh-100">

	<div id="navbar-container"></div>

	<div class="container-fluid px-4 py-4 flex-grow-1">
		<div class="row mb-4">
			<div class="col-12 d-flex justify-content-between align-items-center border-bottom border-corporate pb-2">
				<h4 class="mono fw-bold text-corporate mb-0">
					<i class="fa-solid fa-folder-open me-2"></i>EXPEDIENTE: <span id="uiLocalizador"
						class="text-white">CARGANDO...</span>
				</h4>
				<a href="javascript:history.back()" class="btn btn-sm btn-outline-secondary mono"><i
						class="fa-solid fa-arrow-left me-2"></i>Volver</a>
			</div>
		</div>

		<div class="row g-4">
			<div class="col-lg-8">
				<div class="card shadow-sm rounded-3 border-corporate bg-dark h-100">
					<div
						class="card-header mono small fw-bold text-corporate border-corporate d-flex justify-content-between align-items-center">
						<span><i class="fa-solid fa-pen-to-square me-2"></i>Datos Modificables</span>
						<span id="uiEstadoBadge" class="badge bg-secondary">...</span>
					</div>
					<div class="card-body">
						<form id="formDetalleSBU">
							<input type="hidden" id="detIdReserva">
							<div class="row g-3 mb-3">
								<div class="col-md-6">
									<label class="form-label small text-muted-sbu mono">Paquete de Expedición</label>
									<input type="text" id="detPaquete"
										class="form-control bg-dark text-white-50 border-secondary mono" readonly>
								</div>
								<div class="col-md-6">
									<label class="form-label small text-muted-sbu mono">Fecha de Entrada</label>
									<input type="date" id="detFechaViaje"
										class="form-control bg-dark text-white border-corporate mono" required>
								</div>
								<div class="col-md-6">
									<label class="form-label small text-muted-sbu mono">Teléfono de Contacto</label>
									<input type="text" id="detTelefono"
										class="form-control bg-dark text-white border-corporate mono" required>
								</div>
								<div class="col-md-6">
									<label class="form-label small text-muted-sbu mono">Email de Contacto</label>
									<input type="email" id="detEmail"
										class="form-control bg-dark text-white border-corporate mono" required>
								</div>
								<div class="col-12">
									<label class="form-label small text-muted-sbu mono">Observaciones Médicas /
										Logísticas</label>
									<textarea id="detObservaciones"
										class="form-control bg-dark text-white border-corporate mono"
										rows="3"></textarea>
								</div>
							</div>

							<div class="d-flex justify-content-between mt-4 pt-3 border-top border-secondary">
								<div id="zonaBotonesResolucion">
									<button type="button" class="btn btn-success mono fw-bold d-none me-2"
										id="btnAprobarSBU"><i class="fa-solid fa-check me-2"></i>Autorizar</button>
									<button type="button" class="btn btn-danger mono fw-bold d-none"
										id="btnRechazarSBU"><i class="fa-solid fa-ban me-2"></i>Rechazar</button>
								</div>
								<button type="submit" class="btn btn-sbu-accent mono fw-bold text-dark"
									id="btnGuardarSBU"><i class="fa-solid fa-floppy-disk me-2"></i>Guardar
									Cambios</button>
							</div>
						</form>
					</div>
				</div>
			</div>

			<div class="col-lg-4">
				<div class="card shadow-sm rounded-3 border-corporate bg-dark mb-4">
					<div class="card-header mono small fw-bold text-corporate border-corporate"><i
							class="fa-solid fa-user-shield me-2"></i>Trazabilidad Interna</div>
					<div class="card-body">
						<p class="small text-muted-sbu mb-1 mono">Última modificación por:</p>
						<p class="text-white fw-bold mono mb-0" id="uiGestor"><i
								class="fa-solid fa-circle-user text-warning me-2"></i>Sin asignar</p>
					</div>
				</div>

				<div class="card shadow-sm rounded-3 border-corporate bg-dark">
					<div class="card-header mono small fw-bold text-corporate border-corporate"><i
							class="fa-solid fa-users me-2"></i>Lista de Acceso</div>
					<ul class="list-group list-group-flush mono small border-0" id="listaViajerosSBU">
					</ul>
				</div>
			</div>
		</div>
	</div>

	<div id="footer-container" class="mt-auto"></div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script src="/js/script.js"></script>
</body>

</html>
