<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>SBU - Listado de Personal</title>

	<link href="/css/style.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>

<body class="sbu-intranet d-flex flex-column min-vh-100">

	<div id="navbar-container"></div>

	<div class="container py-5 flex-grow-1">
		<div class="row justify-content-center">
			<div class="col-lg-8">

				<div class="d-flex justify-content-between align-items-center mb-4">
					<h3 class="text-white mono mb-0"><i class="fa-solid fa-users me-2"></i>CENSO DE PERSONAL</h3>
					<a href="/intranet/alta-empleado.html" id="btnNuevoEmpleado"
						class="btn btn-sbu-accent mono fw-bold d-none">
						<i class="fa-solid fa-user-plus me-2"></i>Dar de Alta
					</a>
				</div>

				<div class="mb-4">
					<input type="text" id="buscadorEmpleados"
						class="form-control bg-dark text-white border-corporate mono"
						placeholder="🔎 BUSCAR POR NOMBRE O ROL..." style="border-radius: 4px;">
				</div>

				<div class="card shadow-sm border-corporate bg-dark">
					<div class="card-body p-0">
						<ul class="list-group list-group-flush mono" id="listaEmpleadosSoloOnline">
							<li class="list-group-item bg-transparent text-center text-muted-sbu py-5 border-0">
								ESPERANDO DATOS DEL SERVIDOR...
							</li>
						</ul>
					</div>
				</div>

			</div>
		</div>
	</div>

	<div class="modal fade" id="modalEdicionEmpleado" tabindex="-1" aria-hidden="true">
		<div class="modal-dialog modal-dialog-centered modal-lg">
			<div class="modal-content bg-dark text-white border-corporate shadow-lg">
				<div class="modal-header border-corporate pb-2">
					<h5 class="modal-title mono fw-bold text-corporate"><i
							class="fa-solid fa-id-card-clip me-2"></i>FICHA DE PERSONAL SBU</h5>
					<button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
						aria-label="Close"></button>
				</div>
				<div class="modal-body p-4">

					<div id="alertaEdicionEmp" class="alert d-none mono small fw-bold"></div>

					<div class="row">
						<div
							class="col-md-4 text-center border-end border-secondary mb-3 mb-md-0 d-flex flex-column align-items-center">
							<div class="bg-dark text-white rounded d-flex align-items-center justify-content-center position-relative shadow"
								style="width: 140px; height: 170px; border: 2px solid #ffc107; overflow: hidden;">
								<img id="empAvatarPreview" src="" class="position-absolute w-100 h-100 d-none"
									style="object-fit: cover; z-index: 1;">
								<i id="empDefaultAvatarIcon"
									class="fa-solid fa-user-shield fa-4x text-white-50 position-relative"></i>
							</div>

							<label for="inputEmpAvatar" class="btn btn-sm btn-outline-warning mono mt-3 w-100">
								<i class="fa-solid fa-camera me-1"></i> Actualizar Foto
							</label>
							<input type="file" id="inputEmpAvatar" accept="image/*" class="d-none">

							<div class="mt-auto pt-3 w-100">
								<button type="button" id="btnEliminarEmp"
									class="btn btn-outline-danger btn-sm mono fw-bold w-100 d-none">
									<i class="fa-solid fa-trash-can me-1"></i> Purgar Empleado
								</button>
							</div>
						</div>

						<div class="col-md-8 ps-md-4">
							<form id="formEdicionEmpleado">
								<input type="hidden" id="editIdEmp">

								<div class="row g-2 mono small">
									<div class="col-md-6 mb-2">
										<label class="text-white-50">DNI/Pasaporte (Inmutable)</label>
										<input type="text" id="editDniEmp"
											class="form-control bg-secondary border-0 text-white" readonly>
									</div>
									<div class="col-md-6 mb-2">
										<label class="text-white-50">Fecha Nacimiento</label>
										<input type="date" id="editNacimientoEmp"
											class="form-control bg-dark border-corporate text-white" required>
									</div>
									<div class="col-12 mb-2">
										<label class="text-white-50">Nombre</label>
										<input type="text" id="editNombreEmp"
											class="form-control bg-dark border-corporate text-white" required>
									</div>
									<div class="col-md-6 mb-2">
										<label class="text-white-50">Primer Apellido</label>
										<input type="text" id="editApe1Emp"
											class="form-control bg-dark border-corporate text-white" required>
									</div>
									<div class="col-md-6 mb-2">
										<label class="text-white-50">Segundo Apellido</label>
										<input type="text" id="editApe2Emp"
											class="form-control bg-dark border-corporate text-white">
									</div>
									<div class="col-md-12 mb-2">
										<label class="text-white-50">Nacionalidad</label>
										<input type="text" id="editNacionalidadEmp"
											class="form-control bg-dark border-corporate text-white" required>
									</div>
									<div class="col-md-6 mb-2">
										<label class="text-white-50">Teléfono</label>
										<input type="text" id="editTelefonoEmp"
											class="form-control bg-dark border-corporate text-white" required>
									</div>
									<div class="col-md-6 mb-2">
										<label class="text-white-50">Email Institucional</label>
										<input type="email" id="editEmailEmp"
											class="form-control bg-dark border-corporate text-white" required>
									</div>
								</div>

								<div class="text-end mt-3 border-top border-secondary pt-3">
									<button type="submit" id="btnGuardarEdicionEmp"
										class="btn btn-sbu-accent mono fw-bold">
										<i class="fa-solid fa-floppy-disk me-2"></i>Actualizar Ficha
									</button>
								</div>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<div id="footer-container" class="mt-auto"></div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script src="/js/script.js"></script>
</body>

</html>
