<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>SBU - Alta de Personal</title>
	<link href="/css/style.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
	<link
		href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
		rel="stylesheet">
</head>

<body class="sbu-intranet d-flex flex-column min-vh-100">

	<div id="navbar-container"></div>

	<div class="container px-4 py-4 flex-grow-1" style="max-width: 900px;">

		<div class="row mb-4">
			<div class="col-12 d-flex justify-content-between align-items-center border-bottom border-corporate pb-2">
				<h4 class="mono fw-bold text-corporate mb-0">
					<i class="fa-solid fa-user-plus me-2"></i>ALTA DE NUEVO PERSONAL
				</h4>
				<a href="/intranet/empleados.html" class="btn btn-sm btn-outline-secondary mono">
					<i class="fa-solid fa-arrow-left me-2"></i>Volver al Panel
				</a>
			</div>
		</div>

		<div class="card shadow-sm rounded-3">
			<div class="card-header mono small fw-bold text-muted-sbu border-corporate">
				<i class="fa-solid fa-file-signature me-2"></i>Formulario de Registro Oficial SBU
			</div>
			<div class="card-body p-4">

				<div id="alertaRegistro" class="alert d-none mono small fw-bold text-center mb-4" role="alert"></div>

				<form id="formularioAltaEmpleado">

					<h6 class="mono text-corporate border-bottom border-corporate pb-2 mb-3 mt-2">1. Accesos al Sistema
					</h6>
					<div class="row g-3 mb-4">
						<div class="col-md-4">
							<label class="form-label small text-muted-sbu mono">Cuenta de Usuario</label>
							<input type="text" class="form-control bg-dark text-white border-corporate" id="altaCuenta"
								required>
						</div>
						<div class="col-md-4">
							<label class="form-label small text-muted-sbu mono">Clave de Seguridad</label>
							<input type="password" class="form-control bg-dark text-white border-corporate"
								id="altaClave" required>
						</div>
						<div class="col-md-4" id="contenedorRol">
							<label class="form-label small text-muted-sbu mono">Asignación de Rol</label>
							<div class="text-white-50 small mono mt-2"><i
									class="fa-solid fa-spinner fa-spin me-2"></i>Verificando permisos...</div>
						</div>
					</div>

					<h6 class="mono text-corporate border-bottom border-corporate pb-2 mb-3">2. Datos de Filiación</h6>
					<div class="row g-3 mb-4">
						<div class="col-md-4">
							<label class="form-label small text-muted-sbu mono">Nombre Real</label>
							<input type="text" class="form-control bg-dark text-white border-corporate" id="altaNombre"
								required>
						</div>
						<div class="col-md-4">
							<label class="form-label small text-muted-sbu mono">Primer Apellido</label>
							<input type="text" class="form-control bg-dark text-white border-corporate" id="altaApe1"
								required>
						</div>
						<div class="col-md-4">
							<label class="form-label small text-muted-sbu mono">Segundo Apellido</label>
							<input type="text" class="form-control bg-dark text-white border-corporate" id="altaApe2">
						</div>
						<div class="col-md-4">
							<label class="form-label small text-muted-sbu mono">DNI / Pasaporte</label>
							<input type="text" class="form-control bg-dark text-white border-corporate" id="altaDni"
								required>
						</div>
						<div class="col-md-4">
							<label class="form-label small text-muted-sbu mono">Nacionalidad</label>
							<input type="text" class="form-control bg-dark text-white border-corporate"
								id="altaNacionalidad" required>
						</div>
						<div class="col-md-4">
							<label class="form-label small text-muted-sbu mono">Fecha de Nacimiento</label>
							<input type="date" class="form-control bg-dark text-white border-corporate"
								id="altaNacimiento" required>
						</div>
					</div>

					<h6 class="mono text-corporate border-bottom border-corporate pb-2 mb-3">3. Contacto Operativo</h6>
					<div class="row g-3 mb-5">
						<div class="col-md-6">
							<label class="form-label small text-muted-sbu mono">Correo Electrónico Corporativo</label>
							<input type="email" class="form-control bg-dark text-white border-corporate" id="altaEmail"
								required>
						</div>
						<div class="col-md-6">
							<label class="form-label small text-muted-sbu mono">Teléfono Móvil (Terminal)</label>
							<input type="text" class="form-control bg-dark text-white border-corporate"
								id="altaTelefono" required>
						</div>
					</div>

					<div class="d-grid">
						<button type="submit" class="btn btn-sbu-accent py-2 mono fw-bold text-uppercase"
							id="btnProcesarAlta">
							<i class="fa-solid fa-server me-2"></i>Procesar Alta en el Sistema
						</button>
					</div>

				</form>
			</div>
		</div>
	</div>

	<div id="footer-container" class="mt-auto"></div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script src="/js/script.js"></script>
</body>

</html>
