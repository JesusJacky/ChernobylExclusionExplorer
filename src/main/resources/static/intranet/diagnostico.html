<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<title>SBU - Dashboard Completo</title>
	<link href="/css/style.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>

<body class="sbu-intranet d-flex flex-column min-vh-100">

	<div id="navbar-container"></div>

	<div class="container py-5 flex-grow-1">

		<h4 class="text-white mono mb-3"><i class="fa-solid fa-server me-2"></i>NODO SERVIDOR SBU</h4>
		<div class="row g-4 mb-5">
			<div class="col-md-4">
				<div class="card bg-dark border-corporate p-3 text-center">
					<h6 class="text-muted-sbu mono">PETICIONES WEB</h6>
					<h3 class="text-white mono" id="peticiones">0</h3>
				</div>
			</div>
			<div class="col-md-4">
				<div class="card bg-dark border-corporate p-3 text-center">
					<h6 class="text-muted-sbu mono">UPTIME SERVIDOR</h6>
					<h3 class="text-white mono" id="uptime">--</h3>
				</div>
			</div>
			<div class="col-md-4">
				<div class="card bg-dark border-corporate p-3">
					<div class="d-flex justify-content-between mb-2">
						<h6 class="text-muted-sbu mono">RAM SERVIDOR</h6>
						<span class="text-white mono" id="ramTexto">--</span>
					</div>
					<div class="progress" style="height: 10px; background-color: #373e47;">
						<div id="ramBar" class="progress-bar bg-corporate" style="width: 0%"></div>
					</div>
				</div>
			</div>
		</div>

		<h4 class="text-white mono mb-3"><i class="fa-solid fa-desktop me-2"></i>TERMINAL LOCAL</h4>
		<div class="row g-4">
			<div class="col-md-3">
				<div class="card bg-dark border-corporate p-3">
					<h6 class="text-muted-sbu mono">CPU</h6>
					<h5 class="text-white" id="cpuCores">--</h5>
				</div>
			</div>
			<div class="col-md-3">
				<div class="card bg-dark border-corporate p-3">
					<h6 class="text-muted-sbu mono">RAM</h6>
					<h5 class="text-white" id="ramTotal">--</h5>
				</div>
			</div>
			<div class="col-md-6">
				<div class="card bg-dark border-corporate p-3">
					<h6 class="text-muted-sbu mono">GPU / GRÁFICOS</h6>
					<h5 class="text-white" id="gpuInfo" style="font-size: 0.9rem;">--</h5>
				</div>
			</div>
			<div class="col-md-6">
				<div class="card bg-dark border-corporate p-3">
					<h6 class="text-muted-sbu mono">SISTEMA OPERATIVO</h6>
					<h5 class="text-white" id="osInfo" style="font-size: 0.9rem;">--</h5>
				</div>
			</div>
			<div class="col-md-6">
				<div class="card bg-dark border-corporate p-3">
					<h6 class="text-muted-sbu mono">NAVEGADOR</h6>
					<h5 class="text-white" id="browserInfo" style="font-size: 0.9rem;">--</h5>
				</div>
			</div>
			<div class="col-md-12">
				<div class="card bg-dark border-corporate p-3 text-center">
					<h1 class="text-white mono" id="horaLocal">00:00:00</h1>
				</div>
			</div>
		</div>
	</div>

	<div id="footer-container" class="mt-auto"></div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script src="/js/script.js"></script>
</body>

</html>
