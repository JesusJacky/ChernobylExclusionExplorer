<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Acceso al Sistema - CE Explorer</title>
	<link href="css/style.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
	<link
		href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syncopate:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap"
		rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100 align-items-center justify-content-center dark-page"
	style="background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('img/hero_historia.jpg') center/cover; background-attachment: fixed;">

	<div class="container">
		<div class="row justify-content-center">
			<div class="col-md-6 col-lg-5">

				<div class="text-center mb-4">
					<a href="index.html" class="text-decoration-none">
						<i class="fa-solid fa-radiation fa-3x text-danger mb-3"></i>
						<h2 class="mono text-white text-uppercase fw-bold m-0" style="letter-spacing: 2px;">CE Explorer
						</h2>
					</a>
					<p class="text-white-50 small mt-2 mono">Terminal de Acceso Autorizado</p>
				</div>

				<div class="card login-card shadow-lg p-4 p-md-5 rounded-4">

					<div id="errorLogin" class="alert alert-danger d-none small mono fw-bold text-center" role="alert">
						<i class="fa-solid fa-triangle-exclamation me-2"></i> Credenciales denegadas.
					</div>

					<form action="/login" method="POST">
						<div class="mb-4">
							<label for="username" class="form-label text-white-50 small text-uppercase mono">Nombre de
								Usuario</label>
							<div class="input-group">
								<span class="input-group-text bg-dark border-secondary text-white-50"><i
										class="fa-solid fa-user-shield"></i></span>
								<input type="text" class="form-control form-control-dark py-2" id="username"
									name="username" required>
							</div>
						</div>

						<div class="mb-4">
							<label for="password" class="form-label text-white-50 small text-uppercase mono">Código de
								Seguridad</label>
							<div class="input-group">
								<span class="input-group-text bg-dark border-secondary text-white-50"><i
										class="fa-solid fa-lock"></i></span>
								<input type="password" class="form-control form-control-dark py-2" id="password"
									name="password" required>
							</div>
						</div>

						<div class="d-flex justify-content-between align-items-center mb-4">
							<div class="form-check">
								<input class="form-check-input" type="checkbox" value="" id="rememberMe">
								<label class="form-check-label text-white-50 small" for="rememberMe">Recordar
									credenciales</label>
							</div>
						</div>

						<button type="submit" class="btn btn-danger w-100 py-2 mono fw-bold text-uppercase mb-3">Iniciar
							Conexión</button>

						<div class="text-center mt-4 border-top border-secondary pt-3">
							<p class="text-white-50 small mb-1">¿No dispone de autorización?</p>
							<a href="registro.html"
								class="text-danger text-decoration-none mono small fw-bold">Solicitar Alta en el
								Sistema</a>
						</div>
					</form>
				</div>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script src="js/script.js"></script>
</body>

</html>
