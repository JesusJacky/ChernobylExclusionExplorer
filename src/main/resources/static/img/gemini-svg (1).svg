<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#2b2b25"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    
    <linearGradient id="toxicGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <filter id="shadow">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000" flood-opacity="0.8"/>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bgGlow)"/>

  <g transform="translate(400, 240)">
    <circle r="150" fill="none" stroke="#222" stroke-width="12" filter="url(#shadow)"/>
    <circle r="150" fill="none" stroke="#FF8C00" stroke-width="2" stroke-dasharray="10 15" opacity="0.6"/>
    
    <circle r="130" fill="none" stroke="#444" stroke-width="1"/>
    <circle r="120" fill="none" stroke="#FFD700" stroke-width="1" stroke-dasharray="2 6" opacity="0.4"/>
    
    <path d="M 0,-175 L 0,-125 M 0,175 L 0,-125 M -175,0 L -125,0 M 175,0 L 125,0" stroke="#FF8C00" stroke-width="4" filter="url(#shadow)"/>
    <path d="M -100,-100 L -115,-115 M 100,100 L 115,115 M -100,100 L -115,115 M 100,-100 L 115,-115" stroke="#777" stroke-width="3"/>

    <g fill="url(#toxicGold)" filter="url(#shadow)">
      <circle r="14" filter="url(#neon)"/>
      <g filter="url(#neon)">
        <path d="M -18,-30 A 35,35 0 0,1 18,-30 L 52,-90 A 105,105 0 0,0 -52,-90 Z"/>
      </g>
      <g transform="rotate(120)" filter="url(#neon)">
        <path d="M -18,-30 A 35,35 0 0,1 18,-30 L 52,-90 A 105,105 0 0,0 -52,-90 Z"/>
      </g>
      <g transform="rotate(240)" filter="url(#neon)">
        <path d="M -18,-30 A 35,35 0 0,1 18,-30 L 52,-90 A 105,105 0 0,0 -52,-90 Z"/>
      </g>
    </g>
  </g>

  <g text-anchor="middle" filter="url(#shadow)" transform="translate(0, -15)">
    <text x="400" y="490" font-family="'Arial Black', Impact, sans-serif" font-size="58" fill="#FFF" letter-spacing="12">CHERNOBYL</text>
    <text x="400" y="535" font-family="'Courier New', monospace" font-size="20" fill="#FF8C00" font-weight="bold" letter-spacing="16">EXCLUSION EXPLORER</text>
  </g>
</svg>
