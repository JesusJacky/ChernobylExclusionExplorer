<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Expediente Cliente - CE Explorer</title>
	<link href="/css/style.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
	<link
		href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syncopate:wght@400;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
		rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100 bg-dark">

	<div id="navbar-container"></div>

	<section class="py-5">
		<div class="container">
			<div class="row justify-content-center">
				<div class="col-lg-9">

					<div class="carnet-soviet mb-4">
						<div class="carnet-header p-3">
							<h4 class="mb-1 fw-bold mono"><i class="fa-solid fa-star text-danger me-2"></i> EXPEDIENTE
								DE EXPLORADOR <i class="fa-solid fa-star text-danger ms-2"></i></h4>
							<p class="mb-0 small fw-bold text-uppercase" style="letter-spacing: 2px;">Servicio de
								Seguridad de Ucrania (SBU)</p>
						</div>

						<div class="p-4 p-md-5">
							<div class="row">
								<!-- COLUMNA IZQUIERDA: FOTO (AHORA ABRE EL MODAL) -->
								<div
									class="col-md-4 text-center border-end border-dark border-2 mb-4 mb-md-0 d-flex flex-column align-items-center justify-content-center">

									<!-- Aquí quitamos el input=file directo y ponemos que abra el Modal -->
									<div data-bs-toggle="modal" data-bs-target="#modalSelectorAvatar"
										class="bg-dark text-white rounded d-flex align-items-center justify-content-center mb-3 position-relative shadow"
										style="width: 150px; height: 180px; border: 2px solid #000; cursor: pointer; overflow: hidden; transition: 0.3s;"
										title="Clic para acceder al Archivo Fotográfico">
										<img id="avatarPreview" src="" class="position-absolute w-100 h-100 d-none"
											style="object-fit: cover; top: 0; left: 0; z-index: 1;">
										<i class="fa-solid fa-camera fa-2x text-white-50 position-absolute"
											style="bottom: 10px; right: 10px; z-index: 2;"></i>
										<i id="defaultAvatarIcon"
											class="fa-solid fa-user-astronaut fa-5x text-white-50 position-relative"
											style="z-index: 0;"></i>
									</div>

									<h5 class="mono fw-bold text-uppercase mb-1" id="uiCuenta">USUARIO</h5>
									<p class="small fw-bold mono">ID/REF: <span id="uiId"
											class="text-danger">00000</span></p>
									<div class="sello-sbu text-center mt-4">AUTORIZADO<br><small>ZONA CERO</small></div>
								</div>

								<!-- COLUMNA DERECHA: DATOS -->
								<div class="col-md-8 ps-md-4">
									<form id="formPerfilCliente">
										<input type="hidden" id="perfilId">
										<div id="alertaPerfil" class="alert d-none mono small fw-bold"></div>

										<div class="row g-3">
											<div class="col-md-6">
												<label class="small fw-bold text-uppercase mb-0">Pasaporte / DNI</label>
												<input type="text" id="perfilDni" class="input-carnet input-editable"
													readonly required>
											</div>
											<div class="col-md-6">
												<label class="small fw-bold text-uppercase mb-0">Nacionalidad</label>
												<input type="text" id="perfilNacionalidad"
													class="input-carnet input-editable" readonly required>
											</div>
											<div class="col-12 mt-3">
												<label class="small fw-bold text-uppercase mb-0">Nombre del
													Sujeto</label>
												<input type="text" id="perfilNombre"
													class="input-carnet input-editable fs-5 text-uppercase" readonly
													required>
											</div>
											<div class="col-md-6 mt-3">
												<label class="small fw-bold text-uppercase mb-0">Primer Apellido</label>
												<input type="text" id="perfilApe1"
													class="input-carnet input-editable text-uppercase" readonly
													required>
											</div>
											<div class="col-md-6 mt-3">
												<label class="small fw-bold text-uppercase mb-0">Segundo
													Apellido</label>
												<input type="text" id="perfilApe2"
													class="input-carnet input-editable text-uppercase" readonly>
											</div>
											<div class="col-md-6 mt-3">
												<label class="small fw-bold text-uppercase mb-0">F. Nacimiento</label>
												<input type="date" id="perfilFechaNac"
													class="input-carnet input-editable" readonly required>
											</div>
											<div class="col-md-6 mt-3">
												<label class="small fw-bold text-uppercase mb-0">Teléfono
													Satélite</label>
												<input type="tel" id="perfilTelefono"
													class="input-carnet input-editable" readonly required>
											</div>
											<div class="col-12 mt-3">
												<label class="small fw-bold text-uppercase mb-0">Comunicaciones
													(Email)</label>
												<input type="email" id="perfilEmail" class="input-carnet input-editable"
													readonly required>
											</div>

											<div class="col-md-6 mt-3">
												<div class="d-flex flex-column justify-content-end h-100">
													<label class="small fw-bold text-uppercase mb-1">Clave de
														Acceso</label>
													<input type="password" id="perfilClave"
														class="input-carnet input-editable" readonly value="********">
												</div>
											</div>

											<div class="col-md-6 mt-3 d-none" id="divClaveConfirmar">
												<div
													class="d-flex flex-column justify-content-end h-100 position-relative">
													<label
														class="small fw-bold text-uppercase mb-1 text-warning">Confirmar
														Nueva Clave</label>
													<input type="password" id="perfilClaveConfirmar"
														class="input-carnet input-editable" readonly
														placeholder="Repita la nueva contraseña">

													<small
														class="text-danger d-none fw-bold mt-1 position-absolute w-100"
														style="bottom: -22px; left: 0;" id="errorClave">
														<i class="fa-solid fa-triangle-exclamation me-1"></i> Las
														contraseñas no coinciden.
													</small>
												</div>
											</div>

											<div class="dosimetro-badge mt-4 text-center mono">
												<p class="mb-1 small text-white-50">REGISTRO ANUAL DE DOSIMETRÍA (RAD)
												</p>
												<h4 class="mb-0 fw-bold"><i class="fa-solid fa-radiation me-2"></i>
													<span id="uiRadiacion">0.00</span> mSv
												</h4>
											</div>

											<div class="mt-4 pt-3 border-top border-dark text-end">
												<button type="button" id="btnHabilitarEdicion"
													class="btn btn-dark mono fw-bold">
													<i class="fa-solid fa-pen-to-square me-2"></i>Solicitar Modificación
												</button>

												<div id="grupoBotonesGuardar" class="d-none">
													<div class="d-flex justify-content-end flex-wrap gap-2">
														<button type="button" id="btnCancelarEdicion"
															class="btn btn-outline-danger mono fw-bold">
															<i class="fa-solid fa-xmark me-1"></i>Cancelar
														</button>
														<button type="submit" id="btnGuardarPerfil"
															class="btn btn-success mono fw-bold shadow">
															<i class="fa-solid fa-floppy-disk me-2"></i>Sellar Cambios
														</button>
													</div>
												</div>
											</div>
									</form>
								</div>
							</div>
						</div>
					</div>

					<div class="text-center mt-3">
						<button type="button" id="btnDarDeBaja" class="btn btn-outline-danger btn-sm mono fw-bold"><i
								class="fa-solid fa-skull-crossbones me-2"></i>Revocar Credenciales del SBU (Dar de
							Baja)</button>
					</div>

				</div>
			</div>
		</div>
	</section>

	<!-- MODAL: ARCHIVO FOTOGRÁFICO SBU -->
	<div class="modal fade" id="modalSelectorAvatar" tabindex="-1" aria-hidden="true">
		<div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-lg">
			<div class="modal-content bg-dark text-white border-secondary shadow-lg">

				<div class="modal-header border-secondary">
					<h5 class="modal-title mono fw-bold"><i class="fa-solid fa-images text-warning me-2"></i>Archivo
						Fotográfico SBU</h5>
					<button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
						aria-label="Close"></button>
				</div>

				<div class="mb-4 border-bottom border-secondary pb-4">
					<label for="inputAvatarManual" class="btn-rusted-static">
						<i class="fa-solid fa-file-arrow-up me-2"></i>ADJUNTAR RETRATO DE EXPEDIENTE
					</label>
					<input type="file" id="inputAvatarManual" accept="image/*" class="d-none">
				</div>

				<!-- REJILLA DE 20 AVATARES -->
				<h6 class="mono text-muted mb-3"><i class="fa-solid fa-id-badge me-2"></i>Expedientes Predefinidos:
				</h6>
				<div class="row g-3" id="rejillaAvatares">
					<!-- JavaScript pintará aquí los 20 avatares -->
				</div>
			</div>

		</div>
	</div>
	</div>

	<div id="footer-container" class="mt-auto"></div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script src="/js/script.js"></script>
</body>

</html>
